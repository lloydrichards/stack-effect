name: E2E - cli

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/cli/**"
      - "packages/catalog/**"
      - "packages/domain/**"
      - "packages/scaffold/**"
      - "flake.lock"
      - "flake.nix"
  pull_request:
    branches:
      - main
    paths:
      - "apps/cli/**"
      - "packages/catalog/**"
      - "packages/domain/**"
      - "packages/scaffold/**"
      - "flake.lock"
      - "flake.nix"

jobs:
  e2e:
    name: "E2E Test (init + add)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Install Dependencies
        run: |
          nix develop --command bash -lc '
            bun install --frozen-lockfile --silent
          '

      - name: Configure Git
        run: |
          nix develop --command bash -lc '
            git config --global user.name "stack-effect-ci"
            git config --global user.email "stack-effect-ci@example.com"
          '

      - name: Build
        run: |
          nix develop --command bash -lc '
            cd apps/cli
            bun build src/index.ts --outdir=dist --target=bun --minify --banner "#!/usr/bin/env bun"
          '

      - name: Run E2E Tests
        run: |
          nix develop --command bash -lc '
            cd apps/cli
            bunx vitest run --config vitest.e2e.config.ts e2e/init.test.ts e2e/add.test.ts
          '
